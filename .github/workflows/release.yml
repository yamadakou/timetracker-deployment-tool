name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish
      run: dotnet publish src/Timetracker.Controller.Cli/Timetracker.Controller.Cli.csproj --configuration Release --output publish

    - name: Zip artifacts
      run: Compress-Archive -Path publish\* -DestinationPath timetracker-cli-${{ github.ref_name }}.zip

    - name: Create GitHub Release
      run: gh release create ${{ github.ref_name }} timetracker-cli-${{ github.ref_name }}.zip --title "${{ github.ref_name }}" --generate-notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
